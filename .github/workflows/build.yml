name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Package web release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd dist && zip -r ../BMW-E60-Coder-Pro-web.zip .

      - name: Upload web release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: web-release-zip
          path: BMW-E60-Coder-Pro-web.zip

  build-apk:
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Copy web assets to Android
        run: npm exec -- cap sync android

      - name: Generate missing Cordova files
        run: |
          mkdir -p android/capacitor-cordova-android-plugins
          cat > android/capacitor-cordova-android-plugins/cordova.variables.gradle << 'EOF'
          ext {
              cdvPluginPostBuildExtras = []
          }
          EOF

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: >
            platforms;android-35
            build-tools;35.0.0
            platform-tools

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: ./android
        env:
          GRADLE_OPTS: "-Xmx2048m -Dorg.gradle.daemon=false"
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bmw-e60-coder-pro-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Rename APK for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release-assets
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             release-assets/BMW-E60-Coder-Pro-AndroidAuto.apk

      - name: Upload APK release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: release-assets/BMW-E60-Coder-Pro-AndroidAuto.apk

  release:
    runs-on: ubuntu-latest
    needs: [build-web, build-apk]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download web release asset
        uses: actions/download-artifact@v4
        with:
          name: web-release-zip

      - name: Download APK release asset
        uses: actions/download-artifact@v4
        with:
          name: apk-release
          path: ./apk-release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BMW-E60-Coder-Pro-web.zip
            apk-release/BMW-E60-Coder-Pro-AndroidAuto.apk
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
